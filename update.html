<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Actualizando DevHub</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#202020;
  color:white;
  font-family:"Segoe UI", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:#2a2a2a;
  padding:40px;
  border-radius:10px;
  width:400px;
  text-align:center;
}

.progress-container{
  background:#1f1f1f;
  border-radius:6px;
  width:100%;
  height:20px;
  margin-top:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#0078d7;
  border-radius:6px;
  transition: width 0.3s ease;
}

.status{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>
<body>

<div class="box">
  <h2>Actualizando DevHub</h2>
  <p class="status" id="status">Buscando actualizaciones...</p>
  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron')

// actualizar estado
ipcRenderer.on('update-progress', (event, percent) => {
  document.getElementById('progress').style.width = percent + '%'
  document.getElementById('status').innerText = `Descargando actualización... ${percent.toFixed(0)}%`
})

ipcRenderer.on('update-downloaded', () => {
  document.getElementById('status').innerText = 'Actualización lista. Se instalará al cerrar la app.'
  document.getElementById('progress').style.width = '100%'
})
</script>

</body>
</html>
